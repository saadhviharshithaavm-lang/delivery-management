<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customers — FreshDeliver Admin</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🥛</div><span class="logo-text">Fresh<span>Deliver</span></span></div>
    <div class="sidebar-user">
      <div class="avatar" id="sidebar-user-init">A</div>
      <div class="user-info"><div class="user-name" id="sidebar-user-name">Admin</div><div class="user-role" id="sidebar-user-role">Administrator</div></div>
    </div>
    <nav class="sidebar-nav" id="admin-nav"></nav>
    <div class="sidebar-footer"><button class="btn-logout" onclick="Auth.logout()">🚪 <span>Sign Out</span></button></div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="main-content">
    <header class="topbar">
      <button class="hamburger" id="sidebar-toggle">☰</button>
      <span class="topbar-title">Customer Management</span>
    </header>

    <main class="page-content animate-fadeIn">
      <div class="page-header">
        <div class="page-header-info">
          <div class="page-title">Customers</div>
          <div class="page-subtitle">Manage all registered customers</div>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-primary" onclick="openAddModal()">➕ Add Customer</button>
        </div>
      </div>

      <div class="card">
        <div class="table-toolbar">
          <div class="search-box">
            <span>🔍</span>
            <input type="text" id="search-input" placeholder="Search by name, phone, area…" oninput="filterTable()" />
          </div>
          <select class="filter-select" id="status-filter" onchange="filterTable()">
            <option value="">All Status</option>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
          <select class="filter-select" id="area-filter" onchange="filterTable()">
            <option value="">All Areas</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Area</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="customers-body">
              <tr><td colspan="7" class="text-center text-muted" style="padding:32px">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="customer-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Add Customer</span>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid form-grid-2">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="f-name" class="form-control" placeholder="Customer name" />
        </div>
        <div class="form-group">
          <label>Phone Number *</label>
          <input type="text" id="f-phone" class="form-control" placeholder="10-digit number" />
        </div>
        <div class="form-group full">
          <label>Address *</label>
          <input type="text" id="f-address" class="form-control" placeholder="Full address" />
        </div>
        <div class="form-group">
          <label>Area *</label>
          <input type="text" id="f-area" class="form-control" placeholder="e.g. Koramangala" />
        </div>
        <div class="form-group">
          <label>Account Status</label>
          <select id="f-status" class="form-control">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="f-username" class="form-control" placeholder="Login username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="f-password" class="form-control" placeholder="Login password" />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('customer-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCustomer()">💾 Save</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
<script src="js/api-client.js"></script>
<script>
  Auth.requireAuth('admin');
  Auth.initSidebarUser();
  Auth.initMobileSidebar();
  buildAdminSidebar('admin-customers.html');
  initModalClosers();

  let allCustomers = [];
  let editingId = null;

  async function loadCustomers() {
    try {
      allCustomers = await CustomerAPI.getAll();
      // Populate area filter
      const areas = [...new Set(allCustomers.map(c => c.Area))].sort();
      const areaFilter = document.getElementById('area-filter');
      areaFilter.innerHTML = '<option value="">All Areas</option>' + areas.map(a => `<option>${a}</option>`).join('');
      renderTable(allCustomers);
    } catch (error) {
      console.error('Error loading customers:', error);
      showToast('Failed to load customers: ' + error.message, 'error');
      document.getElementById('customers-body').innerHTML =
        '<tr><td colspan="7" class="text-center text-muted" style="padding:32px">Failed to load from backend</td></tr>';
    }
  }

  function renderTable(data) {
    const body = document.getElementById('customers-body');
    if (!data.length) {
      body.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">No customers found</div></div></td></tr>';
      return;
    }
    body.innerHTML = data.map(c => `
      <tr>
        <td class="td-muted">${c.Customer_ID}</td>
        <td><strong>${c.Name}</strong></td>
        <td>${c.Phone_Num}</td>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${c.Address}">${c.Address}</td>
        <td><span class="badge badge-primary">${c.Area}</span></td>
        <td>${statusBadge(c.Account_Status)}</td>
        <td>
          <div class="table-actions">
            <button class="btn btn-secondary btn-xs" onclick="editCustomer('${c.Customer_ID}')">✏️ Edit</button>
            <button class="btn btn-danger btn-xs" onclick="deleteCustomer('${c.Customer_ID}')">🗑️</button>
          </div>
        </td>
      </tr>`).join('');
  }

  function filterTable() {
    const q   = document.getElementById('search-input').value.toLowerCase();
    const st  = document.getElementById('status-filter').value;
    const area= document.getElementById('area-filter').value;
    const filtered = allCustomers.filter(c =>
      (!q || c.Name.toLowerCase().includes(q) || c.Phone_Num.includes(q) || c.Area.toLowerCase().includes(q)) &&
      (!st || c.Account_Status === st) &&
      (!area || c.Area === area)
    );
    renderTable(filtered);
  }

  function openAddModal() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Add New Customer';
    ['f-name','f-phone','f-address','f-area','f-username','f-password'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-status').value = 'Active';
    openModal('customer-modal');
  }

  async function editCustomer(id) {
    const c = allCustomers.find(x => x.Customer_ID == id);
    if (!c) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edit Customer';
    document.getElementById('f-name').value    = c.Name;
    document.getElementById('f-phone').value   = c.Phone_Num;
    document.getElementById('f-address').value = c.Address;
    document.getElementById('f-area').value    = c.Area;
    document.getElementById('f-status').value  = c.Account_Status;
    document.getElementById('f-username').value = c.User_Name || '';
    document.getElementById('f-password').value = '';
    openModal('customer-modal');
  }

  async function saveCustomer() {
    const name    = document.getElementById('f-name').value.trim();
    const phone   = document.getElementById('f-phone').value.trim();
    const address = document.getElementById('f-address').value.trim();
    const area    = document.getElementById('f-area').value.trim();
    const status  = document.getElementById('f-status').value;
    const username = document.getElementById('f-username').value.trim();
    const password = document.getElementById('f-password').value.trim();
    if (!name || !phone || !address || !area) { showToast('Please fill all required fields', 'error'); return; }
    if (!/^\d{10}$/.test(phone)) { showToast('Phone number must be exactly 10 digits', 'error'); return; }
    const data = { Name: name, Phone_Num: phone, Address: address, Area: area, Account_Status: status };
    if (username) data.User_Name = username;
    if (password) data.Password = password;
    showLoading();
    try {
      if (editingId) {
        await CustomerAPI.update(editingId, data);
        showToast('Customer updated successfully!');
      } else {
        await CustomerAPI.create(data);
        showToast('Customer added successfully!');
      }
      closeModal('customer-modal');
      loadCustomers();
    } catch (error) {
      showToast('Failed to save: ' + error.message, 'error');
    } finally {
      hideLoading();
    }
  }

  async function deleteCustomer(id) {
    if (!confirmAction('Delete this customer? This cannot be undone.')) return;
    showLoading();
    try {
      await CustomerAPI.delete(id);
      showToast('Customer deleted', 'warning');
      loadCustomers();
    } catch (error) {
      showToast('Failed to delete: ' + error.message, 'error');
    } finally {
      hideLoading();
    }
  }

  loadCustomers();
</script>
</body>
</html>
