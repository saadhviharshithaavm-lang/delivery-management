<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — FreshDeliver</title>
  <link rel="stylesheet" href="index.css" />
  <style>
    .order-item-row {
      display: grid;
      grid-template-columns: 1fr 100px 80px 40px;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .order-item-row:last-child { border-bottom: none; }
    .order-item-row select, .order-item-row input {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: .85rem;
      background: var(--surface-2);
      outline: none;
      transition: var(--transition);
    }
    .order-item-row select:focus, .order-item-row input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-bg);
      background: white;
    }
    .order-item-row .remove-item {
      width: 32px; height: 32px;
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      color: var(--danger); font-size: 16px;
      cursor: pointer; transition: var(--transition);
    }
    .order-item-row .remove-item:hover { background: var(--danger-light); }
    .order-items-header {
      display: grid;
      grid-template-columns: 1fr 100px 80px 40px;
      gap: 10px;
      padding: 8px 0;
      font-size: .78rem; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .4px;
      border-bottom: 2px solid var(--border);
    }
    .order-total-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0 0;
      margin-top: 12px;
      border-top: 2px solid var(--border);
    }
    .order-total-bar .total-label { font-size: .9rem; font-weight: 600; color: var(--text-secondary); }
    .order-total-bar .total-value { font-family: 'Outfit', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--primary); }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🥛</div><span class="logo-text">Fresh<span>Deliver</span></span></div>
    <div class="sidebar-user">
      <div class="avatar" id="sidebar-user-init">P</div>
      <div class="user-info"><div class="user-name" id="sidebar-user-name">Customer</div><div class="user-role" id="sidebar-user-role">Customer</div></div>
    </div>
    <nav class="sidebar-nav" id="customer-nav"></nav>
    <div class="sidebar-footer"><button class="btn-logout" onclick="Auth.logout()">🚪 <span>Sign Out</span></button></div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="main-content">
    <header class="topbar">
      <button class="hamburger" id="sidebar-toggle">☰</button>
      <span class="topbar-title">My Orders</span>
    </header>

    <main class="page-content animate-fadeIn">
      <div class="page-header">
        <div class="page-header-info">
          <div class="page-title">My Orders</div>
          <div class="page-subtitle">Your complete order history</div>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-primary" onclick="openNewOrderModal()">➕ New Order</button>
        </div>
      </div>

      <div class="card">
        <div class="table-toolbar">
          <div class="search-box">
            <span>🔍</span>
            <input type="text" id="search-input" placeholder="Search order ID…" oninput="filterTable()" />
          </div>
          <select class="filter-select" id="status-filter" onchange="filterTable()">
            <option value="">All Status</option>
            <option value="Pending">Pending</option>
            <option value="Processing">Processing</option>
            <option value="Delivered">Delivered</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Order Date</th>
                <th>Items</th>
                <th>Total Amount</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="orders-body"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Order Detail Modal -->
<div class="modal-overlay" id="order-detail-modal">
  <div class="modal modal-lg">
    <div class="modal-header"><span class="modal-title" id="detail-title">Order Details</span><button class="modal-close">✕</button></div>
    <div class="modal-body" id="order-detail-body"></div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('order-detail-modal')">Close</button></div>
  </div>
</div>

<!-- New Order Modal -->
<div class="modal-overlay" id="new-order-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title">Create New Order</span>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid form-grid-2" style="margin-bottom:20px">
        <div class="form-group">
          <label style="font-size:.82rem;font-weight:600;color:var(--text-secondary);margin-bottom:5px;display:block">Supplier *</label>
          <select id="f-supplier" class="form-control" onchange="onSupplierChange()">
            <option value="">-- Select Supplier --</option>
          </select>
        </div>
        <div class="form-group">
          <label style="font-size:.82rem;font-weight:600;color:var(--text-secondary);margin-bottom:5px;display:block">Payment Method *</label>
          <select id="f-payment-method" class="form-control">
            <option value="UPI">UPI</option>
            <option value="Card">Card</option>
            <option value="Cash">Cash</option>
          </select>
        </div>
      </div>

      <label style="font-size:.82rem;font-weight:600;color:var(--text-secondary);margin-bottom:8px;display:block">Order Items</label>
      <div class="order-items-header">
        <span>Product</span>
        <span>Qty</span>
        <span>Price</span>
        <span></span>
      </div>
      <div id="order-items-list"></div>

      <button class="btn btn-secondary btn-sm" style="margin-top:12px" onclick="addItemRow()">+ Add Item</button>

      <div class="order-total-bar">
        <span class="total-label">Order Total</span>
        <span class="total-value" id="order-total-display">₹0.00</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('new-order-modal')">Cancel</button>
      <button class="btn btn-primary" id="place-order-btn" onclick="placeOrder()">🛒 Place Order</button>
    </div>
  </div>
</div>

<div id="loading-overlay" class="loading-overlay">
  <div class="loading-spinner"></div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/customer.js"></script>
<script src="js/api-client.js"></script>
<script>
  const session = Auth.requireAuth('customer');
  let allOrders = [], allItems = [], allProducts = [], allSuppliers = [], allSupplierProducts = [];
  let selectedSupplierProducts = []; // products available for currently selected supplier

  if (session) {
    Auth.initSidebarUser();
    Auth.initMobileSidebar();
    buildCustomerSidebar('customer-orders.html');
    initModalClosers();

    async function load() {
      showLoading();
      try {
        const [orders, items, products, suppliers, supplierProducts] = await Promise.all([
          OrderAPI.getAll().catch(err => { console.error('Orders API failed:', err); return []; }),
          OrderItemAPI.getAll().catch(err => { console.error('OrderItems API failed:', err); return []; }),
          ProductAPI.getAll().catch(err => { console.error('Products API failed:', err); return []; }),
          SupplierAPI.getAll().catch(err => { console.error('Suppliers API failed:', err); return []; }),
          SupplierProductAPI.getAll().catch(err => { console.error('SupplierProducts API failed:', err); return []; })
        ]);
        // Filter orders for this customer
        allOrders = orders.filter(o => o.Customer_ID == session.id);
        allItems = items;
        allProducts = products;
        allSuppliers = suppliers;
        allSupplierProducts = supplierProducts;
        console.log('Data loaded:', { suppliers: suppliers.length, products: products.length, supplierProducts: supplierProducts.length });
        renderTable(allOrders);
      } catch (error) {
        console.error('Load failed:', error);
        showToast('Failed to load data: ' + error.message, 'error');
      } finally {
        hideLoading();
      }
    }

    const prodMap = () => Object.fromEntries(allProducts.map(p => [p.Product_ID, p]));

    function getItemCount(oid) { return allItems.filter(i => i.Order_ID === oid).length; }

    function renderTable(data) {
      const body = document.getElementById('orders-body');
      if (!data.length) {
        body.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No orders yet</div><div class="empty-desc">Click "New Order" to place your first order.</div></div></td></tr>';
        return;
      }
      const sorted = [...data].sort((a,b) => b.Order_date.localeCompare(a.Order_date));
      body.innerHTML = sorted.map(o => `
        <tr>
          <td class="fw-700">${o.Order_ID}</td>
          <td>${formatDate(o.Order_date)}</td>
          <td><span class="badge badge-muted">${getItemCount(o.Order_ID)} item(s)</span></td>
          <td class="fw-700" style="color:var(--primary)">${formatCurrency(o.Total_amount)}</td>
          <td>${statusBadge(o.Order_status)}</td>
          <td><button class="btn btn-secondary btn-xs" onclick="viewOrder('${o.Order_ID}')">👁️ View</button></td>
        </tr>`).join('');
    }

    function filterTable() {
      const q  = document.getElementById('search-input').value.toLowerCase();
      const st = document.getElementById('status-filter').value;
      renderTable(allOrders.filter(o =>
        (!q || o.Order_ID.toLowerCase().includes(q)) && (!st || o.Order_status === st)
      ));
    }

    function viewOrder(oid) {
      const order = allOrders.find(o => o.Order_ID === oid);
      const pm = Object.fromEntries(allProducts.map(p => [p.Product_ID, p.Product_Name]));
      const items = allItems.filter(i => i.Order_ID === oid);
      document.getElementById('detail-title').textContent = `Order ${oid}`;
      document.getElementById('order-detail-body').innerHTML = `
        <div class="info-row" style="margin-bottom:20px">
          <div class="info-item"><div class="info-label">Date</div><div class="info-value">${formatDate(order.Order_date)}</div></div>
          <div class="info-item"><div class="info-label">Status</div><div class="info-value">${statusBadge(order.Order_status)}</div></div>
          <div class="info-item"><div class="info-label">Total</div><div class="info-value fw-700" style="color:var(--primary)">${formatCurrency(order.Total_amount)}</div></div>
        </div>
        <h5 style="margin-bottom:12px">Order Items</h5>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Product</th><th>Qty</th><th>Price/Unit</th><th>Subtotal</th></tr></thead>
            <tbody>${items.map(i => `
              <tr>
                <td>${pm[i.Product_ID]||i.Product_ID}</td>
                <td>${i.Quantity}</td>
                <td>${formatCurrency(i.Price)}</td>
                <td class="fw-700">${formatCurrency(i.Quantity * i.Price)}</td>
              </tr>`).join('')}
              <tr style="background:var(--surface-2)">
                <td colspan="3" class="fw-700 text-right">Total</td>
                <td class="fw-700" style="color:var(--primary)">${formatCurrency(order.Total_amount)}</td>
              </tr>
            </tbody>
          </table>
        </div>`;
      openModal('order-detail-modal');
    }

    // ── New Order Logic ──

    function openNewOrderModal() {
      if (allSuppliers.length === 0) {
        showToast('No suppliers available. Please check back later.', 'warning');
        return;
      }
      // Populate supplier dropdown
      const suppSelect = document.getElementById('f-supplier');
      suppSelect.innerHTML = '<option value="">-- Select Supplier --</option>' +
        allSuppliers.map(s => `<option value="${s.Supplier_ID}">${s.Supplier_Name}</option>`).join('');
      suppSelect.value = '';

      document.getElementById('f-payment-method').value = 'UPI';
      document.getElementById('order-items-list').innerHTML = '';
      document.getElementById('order-total-display').textContent = '₹0.00';
      selectedSupplierProducts = [];
      openModal('new-order-modal');
    }

    function onSupplierChange() {
      const sid = document.getElementById('f-supplier').value;
      const pm = prodMap();
      if (sid) {
        // Get product IDs linked to this supplier
        const linkedPids = allSupplierProducts.filter(sp => String(sp.Supplier_ID) === String(sid)).map(sp => sp.Product_ID);
        selectedSupplierProducts = linkedPids.map(pid => pm[pid]).filter(Boolean);
        console.log('Selected supplier:', sid, 'Products:', selectedSupplierProducts.length);
        if (selectedSupplierProducts.length === 0) {
          showToast('This supplier has no products available', 'warning');
        }
      } else {
        selectedSupplierProducts = [];
      }
      // Reset items list and add one empty row
      document.getElementById('order-items-list').innerHTML = '';
      document.getElementById('order-total-display').textContent = '₹0.00';
      if (selectedSupplierProducts.length > 0) {
        addItemRow();
      }
    }

    function buildProductOptions(selectedId) {
      return `<option value="">-- Select Product --</option>` +
        selectedSupplierProducts.map(p =>
          `<option value="${p.Product_ID}" ${p.Product_ID === selectedId ? 'selected' : ''}>${p.Product_Name} (${formatCurrency(p.Price_per_unit)}/${p.Unit})</option>`
        ).join('');
    }

    function addItemRow() {
      const list = document.getElementById('order-items-list');
      const row = document.createElement('div');
      row.className = 'order-item-row';
      row.innerHTML = `
        <select class="item-product" onchange="updateItemPrice(this)">${buildProductOptions('')}</select>
        <input type="number" class="item-qty" min="1" value="1" onchange="recalcTotal()" oninput="recalcTotal()" />
        <span class="item-price" style="font-weight:600;color:var(--text-secondary);font-size:.85rem">₹0.00</span>
        <div class="remove-item" onclick="removeItemRow(this)">✕</div>`;
      list.appendChild(row);
    }

    function removeItemRow(el) {
      const list = document.getElementById('order-items-list');
      if (list.children.length <= 1) {
        showToast('Order must have at least one item', 'warning');
        return;
      }
      el.closest('.order-item-row').remove();
      recalcTotal();
    }

    function updateItemPrice(selectEl) {
      const row = selectEl.closest('.order-item-row');
      const pid = selectEl.value;
      const pm = prodMap();
      const product = pm[pid];
      const priceSpan = row.querySelector('.item-price');
      if (product) {
        const qty = parseInt(row.querySelector('.item-qty').value) || 1;
        priceSpan.textContent = formatCurrency(product.Price_per_unit * qty);
      } else {
        priceSpan.textContent = '₹0.00';
      }
      recalcTotal();
    }

    function recalcTotal() {
      const pm = prodMap();
      let total = 0;
      document.querySelectorAll('.order-item-row').forEach(row => {
        const pid = row.querySelector('.item-product').value;
        const qty = parseInt(row.querySelector('.item-qty').value) || 0;
        const product = pm[pid];
        if (product && qty > 0) {
          const sub = product.Price_per_unit * qty;
          row.querySelector('.item-price').textContent = formatCurrency(sub);
          total += sub;
        }
      });
      document.getElementById('order-total-display').textContent = formatCurrency(total);
    }

    async function placeOrder() {
      const pm = prodMap();
      const supplierId = document.getElementById('f-supplier').value;
      const paymentMethod = document.getElementById('f-payment-method').value;
      const btn = document.getElementById('place-order-btn');

      if (!supplierId) {
        showToast('Please select a supplier', 'error');
        return;
      }

      // Collect items
      const items = [];
      let valid = true;
      document.querySelectorAll('.order-item-row').forEach(row => {
        const pid = row.querySelector('.item-product').value;
        const qty = parseInt(row.querySelector('.item-qty').value) || 0;
        if (!pid) { valid = false; return; }
        if (qty < 1) { valid = false; return; }
        const product = pm[pid];
        items.push({ Product_ID: pid, Quantity: qty, Price: product.Price_per_unit });
      });

      if (!valid || items.length === 0) {
        showToast('Please select a product and quantity for each item', 'error');
        return;
      }

      // Check for duplicate products
      const pids = items.map(i => i.Product_ID);
      if (new Set(pids).size !== pids.length) {
        showToast('Duplicate products found. Please use one row per product.', 'error');
        return;
      }

      const totalAmount = items.reduce((sum, i) => sum + (i.Quantity * i.Price), 0);

      showLoading();
      btn.textContent = 'Placing Order…';
      btn.disabled = true;

      try {
        // 1. Create the order
        const newOrder = await OrderAPI.create({
          Customer_ID: parseInt(session.id),
          Order_date: new Date().toISOString().slice(0, 10),
          Order_status: 'Pending',
          Total_amount: totalAmount
        });

        // 2. Create order items
        for (const item of items) {
          await OrderItemAPI.create({
            Order_ID: newOrder.Order_ID,
            Product_ID: parseInt(item.Product_ID),
            Quantity: item.Quantity,
            Price: item.Price
          });
        }

        // 3. Create payment record automatically
        await PaymentAPI.create({
          Order_ID: newOrder.Order_ID,
          Amount: totalAmount,
          Payment_method: paymentMethod,
          Payment_status: 'Pending',
          Payment_Date: null
        });

        closeModal('new-order-modal');
        showToast('Order placed successfully! Payment record created.', 'success');
        await load();
      } catch (error) {
        showToast('Failed to place order: ' + error.message, 'error');
      } finally {
        btn.textContent = '🛒 Place Order';
        btn.disabled = false;
        hideLoading();
      }
    }

    window.filterTable = filterTable;
    window.viewOrder = viewOrder;
    window.openNewOrderModal = openNewOrderModal;
    window.onSupplierChange = onSupplierChange;
    window.addItemRow = addItemRow;
    window.removeItemRow = removeItemRow;
    window.updateItemPrice = updateItemPrice;
    window.recalcTotal = recalcTotal;
    window.placeOrder = placeOrder;
    load();
  }
</script>
</body>
</html>
