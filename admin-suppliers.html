<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suppliers — FreshDeliver Admin</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🥛</div><span class="logo-text">Fresh<span>Deliver</span></span></div>
    <div class="sidebar-user">
      <div class="avatar" id="sidebar-user-init">A</div>
      <div class="user-info"><div class="user-name" id="sidebar-user-name">Admin</div><div class="user-role" id="sidebar-user-role">Administrator</div></div>
    </div>
    <nav class="sidebar-nav" id="admin-nav"></nav>
    <div class="sidebar-footer"><button class="btn-logout" onclick="Auth.logout()">🚪 <span>Sign Out</span></button></div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="main-content">
    <header class="topbar">
      <button class="hamburger" id="sidebar-toggle">☰</button>
      <span class="topbar-title">Supplier Management</span>
    </header>

    <main class="page-content animate-fadeIn">
      <div class="page-header">
        <div class="page-header-info">
          <div class="page-title">Suppliers</div>
          <div class="page-subtitle">Manage suppliers and their product associations</div>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-primary" onclick="openAddModal()">➕ Add Supplier</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
        <div class="stat-card" style="--card-accent:var(--primary)">
          <div class="stat-header"><span class="stat-label">Total Suppliers</span><div class="stat-icon">🏭</div></div>
          <div class="stat-value" id="stat-total">—</div>
        </div>
        <div class="stat-card" style="--card-accent:var(--accent)">
          <div class="stat-header"><span class="stat-label">Products Supplied</span><div class="stat-icon">🛒</div></div>
          <div class="stat-value" id="stat-products">—</div>
        </div>
        <div class="stat-card" style="--card-accent:var(--info)">
          <div class="stat-header"><span class="stat-label">Active Subscriptions</span><div class="stat-icon">🔄</div></div>
          <div class="stat-value" id="stat-subs">—</div>
        </div>
      </div>

      <!-- Suppliers Table -->
      <div class="card">
        <div class="table-toolbar">
          <div class="search-box">
            <span>🔍</span>
            <input type="text" id="search-input" placeholder="Search supplier name or phone…" oninput="filterTable()" />
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Supplier ID</th>
                <th>Supplier Name</th>
                <th>Phone</th>
                <th>Products Supplied</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="suppliers-body">
              <tr><td colspan="5" class="text-center text-muted" style="padding:32px">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="supplier-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Add Supplier</span>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid form-grid-2">
        <div class="form-group">
          <label>Supplier Name *</label>
          <input type="text" id="f-name" class="form-control" placeholder="e.g. Nandini Dairy Farm" />
        </div>
        <div class="form-group">
          <label>Phone Number *</label>
          <input type="text" id="f-phone" class="form-control" placeholder="10-digit number" />
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="f-username" class="form-control" placeholder="Login username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="f-password" class="form-control" placeholder="Login password" />
        </div>
      </div>
      <div style="margin-top:18px">
        <label style="display:block;margin-bottom:8px;font-size:.82rem;font-weight:600;color:var(--text-secondary)">Supplied Products</label>
        <div id="product-checkboxes" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:200px;overflow-y:auto;padding:4px"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('supplier-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSupplier()">💾 Save</button>
    </div>
  </div>
</div>

<div id="loading-overlay" class="loading-overlay">
  <div class="loading-spinner"></div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
<script src="js/api-client.js"></script>
<script>
  Auth.requireAuth('admin');
  Auth.initSidebarUser();
  Auth.initMobileSidebar();
  buildAdminSidebar('admin-suppliers.html');
  initModalClosers();

  let allSuppliers = [], allProducts = [], allSupplierProducts = [], allSubs = [];
  let editingId = null;

  async function load() {
    showLoading();
    try {
      const results = await Promise.all([
        SupplierAPI.getAll().catch(error => { console.error('Supplier load failed', error); return []; }),
        ProductAPI.getAll().catch(error => { console.error('Product load failed', error); return []; }),
        SupplierProductAPI.getAll().catch(error => { console.error('SupplierProduct load failed', error); return []; }),
        SubscriptionAPI.getAll().catch(error => { console.error('Subscription load failed', error); return []; })
      ]);

      [allSuppliers, allProducts, allSupplierProducts, allSubs] = results;
      renderStats();
      renderTable(allSuppliers);
    } catch (error) {
      console.error('Load failed unexpectedly', error);
      showToast('Failed to load supplier page: ' + error.message, 'error');
    } finally {
      hideLoading();
    }
  }

  function renderStats() {
    document.getElementById('stat-total').textContent = allSuppliers.length || 0;
    document.getElementById('stat-products').textContent = allProducts.length || 0;
    document.getElementById('stat-subs').textContent = allSubs.filter(s => s.Status === 'Active').length || 0;
  }

  function getSupplierProductNames(supplierId) {
    return allSupplierProducts
      .filter(sp => sp.Supplier_ID == supplierId)
      .map(sp => allProducts.find(p => p.Product_ID == sp.Product_ID)?.Product_Name || sp.Product_ID);
  }

  function renderProductCheckboxes(selectedIds = []) {
    const container = document.getElementById('product-checkboxes');
    container.innerHTML = allProducts.map(product => {
      const checked = selectedIds.includes(String(product.Product_ID)) ? 'checked' : '';
      return `
        <label class="checkbox-field" style="display:flex;align-items:center;gap:8px;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--bg-secondary)">
          <input type="checkbox" class="supplier-product" value="${product.Product_ID}" ${checked} />
          <span>${product.Product_Name} <small class="text-muted">(${product.Unit})</small></span>
        </label>`;
    }).join('');
  }

  function renderTable(data) {
    const body = document.getElementById('suppliers-body');
    if (!data.length) {
      body.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">🏭</div><div class="empty-title">No suppliers found</div></div></td></tr>';
      return;
    }
    body.innerHTML = data.map(s => {
      const products = getSupplierProductNames(s.Supplier_ID);
      const productLabel = products.length ? `${products.length} product${products.length === 1 ? '' : 's'}` : 'None';
      const escapedNames = products.join(', ').replace(/"/g, '&quot;');
      const title = products.length ? ` title="${escapedNames}"` : '';
      return `<tr>
        <td class="td-muted">${s.Supplier_ID}</td>
        <td><strong>${s.Supplier_Name}</strong></td>
        <td>${s.Phone_Num}</td>
        <td${title}>${productLabel}</td>
        <td>
          <div class="table-actions">
            <button class="btn btn-secondary btn-xs" onclick="editSupplier('${s.Supplier_ID}')">✏️ Edit</button>
            <button class="btn btn-danger btn-xs" onclick="deleteSupplier('${s.Supplier_ID}')">🗑️</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  function filterTable() {
    const q = document.getElementById('search-input').value.toLowerCase();
    renderTable(allSuppliers.filter(s => !q || s.Supplier_Name.toLowerCase().includes(q) || s.Phone_Num.includes(q)));
  }

  async function openAddModal() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Add Supplier';
    document.getElementById('f-name').value = '';
    document.getElementById('f-phone').value = '';
    document.getElementById('f-username').value = '';
    document.getElementById('f-password').value = '';
    renderProductCheckboxes([]);
    openModal('supplier-modal');
  }

  async function editSupplier(id) {
    const s = allSuppliers.find(x => x.Supplier_ID == id);
    if (!s) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edit Supplier';
    document.getElementById('f-name').value  = s.Supplier_Name;
    document.getElementById('f-phone').value = s.Phone_Num;
    document.getElementById('f-username').value = s.User_Name || '';
    document.getElementById('f-password').value = '';
    const selectedIds = allSupplierProducts
      .filter(sp => sp.Supplier_ID == id)
      .map(sp => String(sp.Product_ID));
    renderProductCheckboxes(selectedIds);
    openModal('supplier-modal');
  }

  async function saveSupplier() {
    const name  = document.getElementById('f-name').value.trim();
    const phone = document.getElementById('f-phone').value.trim();
    const username = document.getElementById('f-username').value.trim();
    const password = document.getElementById('f-password').value.trim();
    const selectedIds = Array.from(document.querySelectorAll('.supplier-product:checked')).map(cb => cb.value);
    if (!name || !phone) { showToast('Please fill all required fields', 'error'); return; }
    showLoading();
    try {
      if (editingId) {
        const data = { Supplier_Name: name, Phone_Num: phone };
        if (username) data.User_Name = username;
        if (password) data.Password = password;
        await SupplierAPI.update(editingId, data);
        const existingLinks = await SupplierProductAPI.getBySupplier(editingId);
        const existingIds = existingLinks.map(link => String(link.Product_ID));
        const toAdd = selectedIds.filter(pid => !existingIds.includes(pid));
        const toRemove = existingIds.filter(pid => !selectedIds.includes(pid));
        await Promise.all(toAdd.map(pid => SupplierProductAPI.create({ Supplier_ID: editingId, Product_ID: pid })));
        await Promise.all(toRemove.map(pid => SupplierProductAPI.delete(editingId, pid)));
        showToast('Supplier updated!');
      } else {
        const data = { Supplier_Name: name, Phone_Num: phone };
        if (username) data.User_Name = username;
        if (password) data.Password = password;
        const supplier = await SupplierAPI.create(data);
        await Promise.all(selectedIds.map(pid => SupplierProductAPI.create({ Supplier_ID: supplier.Supplier_ID, Product_ID: pid })));
        showToast('Supplier added!');
      }
      closeModal('supplier-modal');
      load();
    } catch (error) {
      showToast('Failed to save: ' + error.message, 'error');
    } finally {
      hideLoading();
    }
  }

  async function deleteSupplier(id) {
    if (!confirmAction('Delete this supplier?')) return;
    showLoading();
    try {
      await SupplierAPI.delete(id);
      showToast('Supplier deleted', 'warning');
      load();
    } catch (error) {
      showToast('Failed to delete: ' + error.message, 'error');
    } finally {
      hideLoading();
    }
  }

  load();
</script>
</body>
</html>
