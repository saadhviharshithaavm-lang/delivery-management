<!DOCTYPE html>
<html>
<head>
  <title>Auth Test</title>
</head>
<body>
  <h1>Auth Test Page</h1>
  <div id="output"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const output = document.getElementById('output');

    // Test if Auth is defined
    output.innerHTML += '<p>Auth object defined: ' + (typeof Auth !== 'undefined') + '</p>';

    if (typeof Auth !== 'undefined') {
      output.innerHTML += '<p>Auth.login defined: ' + (typeof Auth.login === 'function') + '</p>';

      // Try login with admin credentials
      try {
        const result = Auth.login('admin', 'admin123');
        output.innerHTML += '<p>Login result: ' + JSON.stringify(result) + '</p>';
      } catch (e) {
        output.innerHTML += '<p>Login error: ' + e.message + '</p>';
      }
    } else {
      output.innerHTML += '<p style="color:red;">Auth object not found!</p>';
    }

    // Check if API is defined
    output.innerHTML += '<p>API object defined: ' + (typeof API !== 'undefined') + '</p>';
  </script>
</body>
</html>
